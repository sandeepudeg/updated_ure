<!DOCTYPE html>
<html>
<head>
    <title>Direct Mobile UI Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .test-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="test-info">
        Screen: <span id="screenSize"></span>
    </div>
    
    <script>
        function updateScreenSize() {
            document.getElementById('screenSize').textContent = 
                window.innerWidth + 'x' + window.innerHeight;
        }
        updateScreenSize();
        window.addEventListener('resize', updateScreenSize);
        
        // Load the mobile UI
        window.location.href = 'src/web/v2/gramsetu-mobile.html';
    </script>
</body>
</html>
